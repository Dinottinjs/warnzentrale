version: '3.9'

services:
  warnzentrale:
    build: .
    container_name: feuerwehr-warnzentrale
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist database and uploads outside the container
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
