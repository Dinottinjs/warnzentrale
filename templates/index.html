<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feuerwehr Warnzentrale</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#0a0a0a',
                        'panel-bg': '#1a1a1a',
                        'neon-green': '#39ff14',
                        'fire-red': '#ff0000',
                        'warning-yellow': '#ffcc00'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-bg text-gray-200 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-panel-bg border-b border-gray-800 p-4 flex justify-between items-center z-10 shadow-md">
        <div class="flex items-center space-x-4">
            <h1 class="text-2xl font-bold uppercase tracking-wider text-gray-100 flex items-center">
                <i class="fa-solid fa-shield-halved text-gray-400 mr-3"></i> Warnzentrale
            </h1>
            <div id="test-mode-indicator" class="hidden">
                <span class="bg-warning-yellow text-black px-3 py-1 rounded-full font-bold text-sm animate-pulse flex items-center">
                    <i class="fa-solid fa-triangle-exclamation mr-2"></i> TEST-MODUS AKTIV
                </span>
            </div>
        </div>
        
        <div class="flex flex-col items-end">
            <div id="clock" class="text-xl font-mono tracking-widest text-gray-300">00:00:00</div>
            <div id="system-status" class="text-lg font-bold text-neon-green uppercase mt-1">BEREITSCHAFT</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        
        <!-- Tabs -->
        <div class="flex space-x-2 mb-6">
            <button class="tab-btn active px-6 py-2 bg-panel-bg rounded-t-lg border-b-2 border-neon-green font-semibold transition-colors text-white" data-tab="monitor">
                <i class="fa-solid fa-desktop mr-2"></i> Warn-Monitor
            </button>
            <button class="tab-btn px-6 py-2 bg-panel-bg rounded-t-lg border-b-2 border-transparent hover:text-white hover:bg-gray-800 font-semibold transition-colors text-gray-400" data-tab="settings">
                <i class="fa-solid fa-server mr-2"></i> Server-Einstellungen
            </button>
        </div>

        <!-- Tab Content: Monitor -->
        <div id="tab-monitor" class="tab-content flex-1 flex flex-col space-y-6 overflow-y-auto">
            
            <!-- System Stats Row -->
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-panel-bg p-4 rounded-xl border border-gray-800 shadow-lg flex items-center">
                    <div class="bg-gray-800 p-3 rounded-lg mr-4"><i class="fa-solid fa-microchip text-blue-400 text-xl"></i></div>
                    <div>
                        <div class="text-sm text-gray-400">CPU-Auslastung</div>
                        <div id="cpu-stat" class="text-xl font-bold">0%</div>
                    </div>
                </div>
                <div class="bg-panel-bg p-4 rounded-xl border border-gray-800 shadow-lg flex items-center">
                    <div class="bg-gray-800 p-3 rounded-lg mr-4"><i class="fa-solid fa-memory text-purple-400 text-xl"></i></div>
                    <div>
                        <div class="text-sm text-gray-400">RAM-Auslastung</div>
                        <div id="ram-stat" class="text-xl font-bold">0%</div>
                    </div>
                </div>
                <div class="bg-panel-bg p-4 rounded-xl border border-gray-800 shadow-lg flex items-center">
                    <div class="bg-gray-800 p-3 rounded-lg mr-4"><i class="fa-solid fa-network-wired text-green-400 text-xl"></i></div>
                    <div>
                        <div class="text-sm text-gray-400">Netzwerk</div>
                        <div id="net-stat" class="text-xl font-bold">Verbunden</div>
                    </div>
                </div>
            </div>

            <!-- Active Events -->
            <div class="bg-panel-bg flex-1 rounded-xl border border-gray-800 shadow-lg p-6 flex flex-col">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fa-solid fa-bell mr-2"></i> Aktuelle Meldungen</h2>
                <div id="events-container" class="flex-1 overflow-y-auto space-y-3">
                    <div class="text-gray-500 text-center mt-10 italic">Warte auf Daten...</div>
                </div>
            </div>
        </div>

        <!-- Tab Content: Settings -->
        <div id="tab-settings" class="tab-content hidden flex-1 bg-panel-bg rounded-xl border border-gray-800 shadow-lg p-6 overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-3"><i class="fa-solid fa-sliders mr-2"></i> System-Konfiguration</h2>
            
            <form id="settings-form" class="space-y-8">
                
                <!-- Operating Mode Section -->
                <section class="bg-black/30 p-5 rounded-lg border border-gray-800">
                    <h3 class="text-lg font-semibold mb-4 text-gray-300">Betriebsmodus</h3>
                    <div class="flex items-center mb-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="mode-toggle" class="sr-only peer">
                            <div class="w-14 h-7 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-neon-green"></div>
                            <span class="ml-3 text-sm font-medium" id="mode-label">Test-Modus (Simulator)</span>
                        </label>
                    </div>
                </section>

                <!-- Live API Settings Section -->
                <section id="api-settings-section" class="bg-black/30 p-5 rounded-lg border border-gray-800 opacity-50 pointer-events-none transition-opacity">
                    <h3 class="text-lg font-semibold mb-4 text-gray-300">Live-API Konfiguration</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">API Endpunkt URL</label>
                            <input type="url" id="api-url" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none" placeholder="https://api.example.com/v1/events">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Abfrage-Intervall (Sekunden)</label>
                            <input type="number" id="poll-interval" min="1" max="3600" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none" value="5">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-400 mb-1">API Security Token (Bearer)</label>
                            <div class="relative">
                                <input type="password" id="api-key" class="w-full bg-gray-900 border border-gray-700 rounded p-2 pr-10 text-white focus:border-neon-green focus:outline-none" placeholder="Token hier einfügen...">
                                <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex items-center">
                        <button type="button" id="test-connection-btn" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded border border-gray-600 transition-colors">
                            <i class="fa-solid fa-plug mr-2"></i> Verbindung testen
                        </button>
                        <span id="test-connection-result" class="ml-4 text-sm font-bold"></span>
                    </div>
                </section>

                <!-- Network Settings Section -->
                <section class="bg-black/30 p-5 rounded-lg border border-gray-800">
                    <h3 class="text-lg font-semibold mb-4 text-gray-300">Netzwerk-Konfiguration (Simuliert)</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Verbindungstyp</label>
                            <select id="net-type" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none">
                                <option value="LAN">LAN (Ethernet)</option>
                                <option value="WLAN">WLAN (WiFi)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">IP-Zuweisung</label>
                            <select id="net-method" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none">
                                <option value="DHCP">DHCP (Automatisch)</option>
                                <option value="Static">Statisch</option>
                            </select>
                        </div>
                    </div>

                    <div id="wlan-settings" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">SSID</label>
                            <input type="text" id="net-ssid" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">WLAN-Passwort</label>
                            <input type="password" id="net-password" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none">
                        </div>
                    </div>

                    <div id="static-ip-settings" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">IP-Adresse</label>
                            <input type="text" id="net-ip" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none" placeholder="192.168.1.100">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Subnetzmaske</label>
                            <input type="text" id="net-subnet" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none" placeholder="255.255.255.0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Gateway</label>
                            <input type="text" id="net-gateway" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-neon-green focus:outline-none" placeholder="192.168.1.1">
                        </div>
                    </div>
                </section>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="bg-neon-green hover:bg-green-500 text-black font-bold py-3 px-8 rounded shadow-lg transition-colors">
                        <i class="fa-solid fa-save mr-2"></i> Einstellungen speichern
                    </button>
                </div>
            </form>
        </div>

    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
